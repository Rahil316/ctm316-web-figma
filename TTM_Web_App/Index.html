<!doctype html>
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ttm316 — Text Tokens Manager</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* ── CSS Tokens ───────────────────────────────────────────── */
      :root {
        --bg-app: #0d0d0d;
        --bg-panel: #1e1e1e;
        --bg-card: #2b2b2b;
        --bg-input: #333333;
        --bg-hover: #3c3c3c;
        --bg-active: #444444;
        --border: #444444;
        --border-focus: #18a0fb;
        --text-primary: #ffffff;
        --text-muted: #b3b3b3;
        --text-dim: #888888;

        --accent: #18a0fb;
        --accent-hover: #0089e8;
        --accent-glow: rgba(24, 160, 251, 0.3);

        /* Semantic UI Colors */
        --success: #27ae60;
        --warning: #f59e0b;
        --danger: #e74c3c;
        --info: #18a0fb;
        --creative: #e91e63;
        --discovery: #00bcd4;
        --attention: #f39c12;
        --secondary: #9b59b6;

        --font: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: "SF Mono", "Cascadia Code", "Fira Code", monospace;
      }
      body.app-light-mode {
        --bg-app: #d2d8e5;
        --bg-panel: #ffffff;
        --bg-card: #f8f9fa;
        --bg-input: #ffffff;
        --bg-hover: #f1f3f5;
        --bg-active: #e9ecef;
        --border: #dee2e6;
        --border-focus: #18a0fb;
        --text-primary: #212529;
        --text-muted: #6c757d;
        --text-dim: #adb5bd;
      }

      /* ── Base ─────────────────────────────────────────────────── */
      body {
        font-family: var(--font);
        color: var(--text-primary);
        background-color: var(--bg-app);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100vh;
        line-height: 1.6;
        overflow: hidden;
      }

      /* ── Sidebar toggle ───────────────────────────────────────── */
      app.sidebar-hidden aside {
        width: 0 !important;
        min-width: 0 !important;
        padding: 0 !important;
        border-width: 0 !important;
        opacity: 0;
        overflow: hidden;
      }

      /* ── Tabs ─────────────────────────────────────────────────── */
      .tab-panel {
        display: none;
      }
      .tab-panel.active {
        display: block;
      }
      .tab-panel.animate-in {
        animation: fadeSlideIn 0.25s ease;
      }
      .tab-btn.active {
        color: var(--accent) !important;
        border-bottom-color: var(--accent) !important;
      }
      .sidebar-tabs {
        border-bottom: 1px solid var(--border);
        margin-bottom: 8px;
        flex-shrink: 0;
      }
      .sidebar-tab-btn {
        position: relative;
        padding: 12px 12px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        transition: all 0.2s ease;
      }
      .sidebar-tab-btn:hover {
        color: var(--text-primary);
      }
      .sidebar-tab-btn.active {
        color: var(--accent);
      }
      .sidebar-tab-btn.active::after {
        content: "";
        position: absolute;
        bottom: -1px;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--accent);
        border-radius: 2px 2px 0 0;
      }

      /* ── Errors panel collapse ────────────────────────────────── */
      .errors-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.25s ease;
      }
      .errors-content.expanded {
        max-height: 400px;
        overflow-y: auto;
      }
      .errors-toggle.collapsed {
        transform: rotate(-90deg);
      }

      /* ── Drop overlay ─────────────────────────────────────────── */
      #drop-overlay {
        display: none;
      }
      #drop-overlay.active {
        display: flex;
        pointer-events: auto;
      }

      /* ── Keyframes ────────────────────────────────────────────── */
      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Tooltip pseudo-element ───────────────────────────────── */
      [data-tooltip] {
        position: relative;
      }
      [data-tooltip]::before {
        content: attr(data-tooltip);
        position: absolute;
        bottom: calc(100% + 6px);
        left: 50%;
        transform: translateX(-50%) translateY(4px);
        padding: 4px 8px;
        background-color: var(--bg-card);
        color: var(--text-primary);
        border: 1px solid var(--border);
        font-size: 11px;
        font-family: var(--font);
        border-radius: 6px;
        white-space: nowrap;
        opacity: 0;
        visibility: hidden;
        transition: all 0.15s ease;
        z-index: 100;
        pointer-events: none;
      }
      [data-tooltip]:hover::before {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(0);
      }

      /* ── Copy success ─────────────────────────────────────────── */
      .copy-success {
        outline: 2px solid var(--success);
        outline-offset: 2px;
        border-radius: 4px;
      }

      /* ── Custom scrollbar ─────────────────────────────────────── */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: var(--bg-active);
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: var(--bg-hover);
      }

      /* ── Dialog backdrop ──────────────────────────────────────── */
      dialog::backdrop {
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
      }

      /* ── Print ────────────────────────────────────────────────── */
      @media print {
        aside,
        #mainActionBtns {
          display: none;
        }
      }
    </style>
  </head>
  <body></body>
  <script src="Scripts.js"></script>
</html>
