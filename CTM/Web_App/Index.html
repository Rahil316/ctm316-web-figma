<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ctm316 — Color System Designer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* ── CSS Tokens ───────────────────────────────────────────── */
      :root {
        --bg-app: #0d0d0d;
        --bg-panel: #1e1e1e;
        --bg-card: #2b2b2b;
        --bg-input: #333333;
        --bg-hover: #3c3c3c;
        --bg-active: #444444;
        --border: #444444;
        --border-focus: #18a0fb;
        --text-primary: #ffffff;
        --text-muted: #b3b3b3;
        --text-dim: #888888;

        --accent: #18a0fb;
        --accent-hover: #0089e8;
        --accent-glow: rgba(24, 160, 251, 0.3);

        /* Semantic UI Colors */
        --success: #27ae60;
        --warning: #f59e0b;
        --danger: #e74c3c;
        --info: #18a0fb;
        --creative: #e91e63;
        --discovery: #00bcd4;
        --attention: #f39c12;
        --secondary: #9b59b6;

        --font: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: "SF Mono", "Cascadia Code", "Fira Code", monospace;
      }
      body.app-light-mode {
        --bg-app: #d2d8e5;
        --bg-panel: #ffffff;
        --bg-card: #f8f9fa;
        --bg-input: #ffffff;
        --bg-hover: #f1f3f5;
        --bg-active: #e9ecef;
        --border: #dee2e6;
        --border-focus: #18a0fb;
        --text-primary: #212529;
        --text-muted: #6c757d;
        --text-dim: #adb5bd;
      }

      /* ── Base ─────────────────────────────────────────────────── */
      body {
        font-family: var(--font);
        color: var(--text-primary);
        background-color: var(--bg-app);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100vh;
        line-height: 1.6;
        overflow: hidden;
      }

      /* ── Sidebar toggle ───────────────────────────────────────── */
      app.sidebar-hidden aside {
        width: 0 !important;
        min-width: 0 !important;
        padding: 0 !important;
        border-width: 0 !important;
        opacity: 0;
        overflow: hidden;
      }

      /* ── Tabs ─────────────────────────────────────────────────── */
      .tab-panel {
        display: none;
      }
      .tab-panel.active {
        display: block;
      }
      .tab-panel.animate-in {
        animation: fadeSlideIn 0.25s ease;
      }
      .tab-btn.active {
        color: var(--accent) !important;
        border-bottom-color: var(--accent) !important;
      }
      .sidebar-tabs {
        border-bottom: 1px solid var(--border);
        margin-bottom: 8px;
        flex-shrink: 0;
      }
      .sidebar-tab-btn {
        position: relative;
        padding: 12px 12px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        transition: all 0.2s ease;
      }
      .sidebar-tab-btn:hover {
        color: var(--text-primary);
      }
      .sidebar-tab-btn.active {
        color: var(--accent);
      }
      .sidebar-tab-btn.active::after {
        content: "";
        position: absolute;
        bottom: -1px;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--accent);
        border-radius: 2px 2px 0 0;
      }

      /* ── Errors panel collapse ────────────────────────────────── */
      .errors-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.25s ease;
      }
      .errors-content.expanded {
        max-height: 400px;
        overflow-y: auto;
      }
      .errors-toggle.collapsed {
        transform: rotate(-90deg);
      }

      /* ── Drop overlay ─────────────────────────────────────────── */
      #drop-overlay {
        display: none;
      }
      #drop-overlay.active {
        display: flex;
        pointer-events: auto;
      }

      /* ── Keyframes ────────────────────────────────────────────── */
      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Tooltip pseudo-element ───────────────────────────────── */
      [data-tooltip] {
        position: relative;
      }
      [data-tooltip]::before {
        content: attr(data-tooltip);
        position: absolute;
        bottom: calc(100% + 6px);
        left: 50%;
        transform: translateX(-50%) translateY(4px);
        padding: 4px 8px;
        background-color: var(--bg-card);
        color: var(--text-primary);
        border: 1px solid var(--border);
        font-size: 11px;
        font-family: var(--font);
        border-radius: 6px;
        white-space: nowrap;
        opacity: 0;
        visibility: hidden;
        transition: all 0.15s ease;
        z-index: 100;
        pointer-events: none;
      }
      [data-tooltip]:hover::before {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(0);
      }

      /* ── Copy success ─────────────────────────────────────────── */
      .copy-success {
        outline: 2px solid var(--success);
        outline-offset: 2px;
        border-radius: 4px;
      }

      /* ── Custom scrollbar ─────────────────────────────────────── */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: var(--bg-active);
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: var(--bg-hover);
      }

      /* ── Dialog backdrop ──────────────────────────────────────── */
      dialog::backdrop {
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
      }

      /* ── Print ────────────────────────────────────────────────── */
      @media print {
        aside,
        #mainActionBtns {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <app class="flex flex-col h-[100vh] w-full">
      <header class="bg-[var(--bg-panel)] border-b border-[var(--border)] px-4 py-2 flex items-center justify-between flex-shrink-0">
        <div class="flex items-center gap-3">
          <button id="toggleSidebarBtn" title="Toggle Sidebar" class="bg-[var(--bg-input)] hover:bg-[var(--bg-hover)] border border-[var(--border)] w-10 h-10 flex items-center justify-center rounded-[8px] transition-colors text-[var(--text-primary)]">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <h1 class="text-[24px] font-bold">ctm316</h1>
        </div>
        <div class="flex gap-1.5 items-center">
          <button id="toggleThemeBtn" title="Toggle Light / Dark" class="bg-[var(--bg-input)] hover:bg-[var(--bg-hover)] border border-[var(--border)] w-10 h-10 flex items-center justify-center rounded-[8px] transition-colors text-[var(--text-primary)]">
            <svg id="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none">
              <circle cx="12" cy="12" r="5" />
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
            </svg>
            <svg id="theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
          <span id="mainActionBtns" class="flex gap-1.5"></span>
        </div>
      </header>

      <div class="flex gap-2 p-2 flex-1 min-h-0">
        <aside id="sidebar-container" class="flex flex-col bg-[var(--bg-panel)] rounded-[16px] overflow-hidden border border-[var(--border)] transition-[width,opacity,padding,border-width] duration-300 w-[360px] flex-shrink-0">
          <div class="sidebar-tabs flex items-center justify-between px-2">
            <div class="flex gap-1">
              <button class="sidebar-tab-btn active" data-tab="color-groups">Color Groups</button>
              <button class="sidebar-tab-btn" data-tab="roles-config">Roles Configuration</button>
            </div>
            <button id="openSettingsBtn" class="p-2 text-[var(--text-muted)] hover:text-[var(--text-primary)] transition-colors" title="Basic Settings">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path
                  d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
                ></path>
              </svg>
            </button>
          </div>
          <div id="colorInputs" class="custom-scrollbar flex-1 p-2 overflow-y-auto"></div>
        </aside>

        <main class="custom-scrollbar rounded-[16px] p-4 overflow-y-auto bg-[var(--bg-panel)] border border-[var(--border)] flex-1 min-w-0">
          <div class="tabs-navigation flex gap-1 mb-4 border-b-2 border-[var(--border)]">
            <button
              class="tab-btn active px-4 py-2 bg-transparent border-none border-b-2 border-transparent -mb-0.5 text-[13px] font-semibold text-[var(--text-muted)] cursor-pointer transition-all duration-150 rounded-t-[8px] hover:text-[var(--text-primary)] hover:bg-[var(--bg-hover)]"
              data-target="panel-colorRamps"
            >
              Raw Colors
            </button>
            <button
              class="tab-btn px-4 py-2 bg-transparent border-none border-b-2 border-transparent -mb-0.5 text-[13px] font-semibold text-[var(--text-muted)] cursor-pointer transition-all duration-150 rounded-t-[8px] hover:text-[var(--text-primary)] hover:bg-[var(--bg-hover)]"
              data-target="panel-tokens-light"
            >
              Light Theme
            </button>
            <button
              class="tab-btn px-4 py-2 bg-transparent border-none border-b-2 border-transparent -mb-0.5 text-[13px] font-semibold text-[var(--text-muted)] cursor-pointer transition-all duration-150 rounded-t-[8px] hover:text-[var(--text-primary)] hover:bg-[var(--bg-hover)]"
              data-target="panel-tokens-dark"
            >
              Dark Theme
            </button>
          </div>
          <div id="rawColorsContainer"></div>
        </main>
      </div>
    </app>

    <!-- Drag-drop overlay -->
    <div id="drop-overlay" class="fixed inset-0 bg-[rgba(var(--bg-app-rgb,13,13,13),0.88)] backdrop-blur-sm items-center justify-center z-[200] border-2 border-dashed border-[var(--accent)] m-3 rounded-[16px] pointer-events-none flex-col gap-4" aria-hidden="true">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="17 8 12 3 7 8" />
        <line x1="12" y1="3" x2="12" y2="15" />
      </svg>
      <p class="text-[var(--text-primary)] text-base font-semibold">Drop JSON config to import</p>
    </div>

    <!-- Import confirmation dialog -->
    <dialog id="import-confirm-dialog" class="bg-[var(--bg-panel)] text-[var(--text-primary)] border border-[var(--border)] rounded-[16px] p-8 max-w-[380px] w-[90vw] text-center shadow-[0_24px_48px_rgba(0,0,0,0.6)]">
      <div class="w-16 h-16 bg-[rgba(245,158,11,0.1)] rounded-full flex items-center justify-center mx-auto mb-4 text-[var(--warning)]">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
          <line x1="12" y1="9" x2="12" y2="13" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
      </div>
      <h2 class="text-[18px] font-bold mb-2.5">Overwrite current config?</h2>
      <p class="text-[13px] text-[var(--text-muted)] leading-relaxed mb-6">You have unsaved changes. Importing will replace all color groups and roles.</p>
      <div class="flex flex-col gap-2.5">
        <button id="import-dialog-overwrite" class="w-full h-10 px-4 bg-[var(--accent)] text-white rounded-[8px] text-[13px] font-semibold cursor-pointer transition-colors duration-150 hover:bg-[var(--accent-hover)] shadow-[0_4px_12px_var(--accent-glow)]">Import &amp; Overwrite</button>
        <button id="import-dialog-cancel" class="w-full h-10 px-4 bg-[var(--bg-input)] text-[var(--text-primary)] border border-[var(--border)] rounded-[8px] text-[13px] font-semibold cursor-pointer transition-colors duration-150 hover:bg-[var(--bg-hover)]">Cancel</button>
      </div>
    </dialog>
  </body>

  <script src="JS/Utils.js"></script>
  <script src="JS/ClrGen.js"></script>
  <script src="JS/UiGen.js"></script>
  <script src="JS/DocGen.js"></script>
  <script>
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initializeColorControls);
    } else {
      initializeColorControls();
    }

    const toggleThemeBtn = document.getElementById("toggleThemeBtn");
    const sunIcon = document.getElementById("theme-icon-sun");
    const moonIcon = document.getElementById("theme-icon-moon");
    let isLight = false;

    toggleThemeBtn.onclick = () => {
      isLight = !isLight;
      document.body.classList.toggle("app-light-mode", isLight);
      sunIcon.style.display = isLight ? "block" : "none";
      moonIcon.style.display = isLight ? "none" : "block";
    };
  </script>
</html>
